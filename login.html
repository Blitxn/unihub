<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unihub – Login</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="card">

    <!-- Left Panel -->
    <div class="panel-left">
      <div class="panel-left__top">
        <h1 class="brand-title">Welcome to<br>Unihub</h1>
        <p class="brand-tagline">Discover university. Shape your goal.</p>
      </div>

      <div class="bear-wrap">
        <img src="bear nobg.png" alt="Unihub mascot bear" class="bear-img" />
      </div>

      <p class="signup-prompt">Don't have an account? <a href="#">Create one</a></p>
    </div>

    <!-- Right Panel -->
    <div class="panel-right">
      <div class="form-wrap">
        <h2 class="form-title">Welcome Back!</h2>
        <p class="form-subtitle">Continue your path to academic success.</p>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Enter your email address" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter your password" />
        </div>

        <div class="form-row">
          <label class="remember">
            <input type="checkbox" /> Remember me
          </label>
          <a href="#" class="link-blue">Forgot Password?</a>
        </div>

        <button class="btn-login">Login</button>
      </div>
    </div>

  </div>
</body>
</html>
