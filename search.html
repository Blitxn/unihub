<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniHub - Universities</title>
    <link rel="stylesheet" href="search.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- HERO SECTION (blue top) -->
    <div class="hero">

        <!-- NAVBAR -->
        <header class="header">
            <div class="logo">UNIHUB</div>
            <nav class="nav">
                <a href="#" class="nav-link">Home</a>
                <a href="#" class="nav-link active">Universities</a>
                <a href="#" class="nav-link">Scholarships</a>
                <a href="#" class="nav-link">Contact</a>
            </nav>
            <div class="avatar">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="18" cy="18" r="18" fill="rgba(255,255,255,0.2)"/>
                    <circle cx="18" cy="14" r="6" fill="rgba(255,255,255,0.85)"/>
                    <ellipse cx="18" cy="30" rx="10" ry="6" fill="rgba(255,255,255,0.85)"/>
                </svg>
            </div>
        </header>

        <!-- SEARCH AREA -->
        <div class="search-area">
            <h1 class="search-title">How can we help you?</h1>
            <p class="search-sub">Search here to get answers</p>

            <div class="search-bar">
                <input type="text" placeholder="" class="search-input" />
                <button class="search-btn">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b8ef5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </button>
            </div>

            <div class="keywords-row">
                <span class="keywords-label">Popular keywords</span>
                <span class="keyword-tag">RUPP</span>
                <span class="keyword-tag">ITC</span>
            </div>
        </div>

    </div>

    <!-- RESULTS SECTION (light bottom) -->
    <div class="results-section">
        <div class="cards-grid">

            <div class="uni-card">
                <div class="uni-thumb"></div>
                <p class="uni-name">UNIVERSITY 1</p>
            </div>

            <div class="uni-card">
                <div class="uni-thumb"></div>
                <p class="uni-name">UNIVERSITY 1</p>
            </div>

            <div class="uni-card">
                <div class="uni-thumb"></div>
                <p class="uni-name">UNIVERSITY 1</p>
            </div>

            <div class="uni-card">
                <div class="uni-thumb"></div>
                <p class="uni-name">UNIVERSITY 1</p>
            </div>

            <div class="uni-card">
                <div class="uni-thumb"></div>
                <p class="uni-name">UNIVERSITY 1</p>
            </div>

            <div class="uni-card">
                <div class="uni-thumb"></div>
                <p class="uni-name">UNIVERSITY 1</p>
            </div>

        </div>
    </div>

</body>
</html>
